services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ds107-backend
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ds107-frontend
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
